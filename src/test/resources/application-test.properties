spring.config.import=optional:file:.env.test[.properties]

# Uses TEST_DATABASE_* values when present. If no URL is provided, defaults
# to an in-memory H2 database configured for PostgreSQL compatibility.
spring.datasource.url=${TEST_DATABASE_URL:jdbc:h2:mem:steelworks_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${TEST_DATABASE_USERNAME:sa}
spring.datasource.password=${TEST_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${TEST_DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${TEST_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
